<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandarina CF - Liga Roth</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            min-height: 100vh;
            color: white;
        }
        .escudo-container {
            width: 180px;
            height: 180px;
            margin: 30px auto;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .escudo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .escudo-placeholder {
            font-size: 50px;
        }
        h1 {
            font-size: 2.8em;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .liga {
            font-size: 1.3em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .trofeos {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }
        .trofeo {
            background: rgba(255,255,255,0.25);
            padding: 20px;
            border-radius: 15px;
            min-width: 120px;
        }
        .trofeo-icon {
            font-size: 40px;
        }
        .trofeo-nombre {
            font-weight: bold;
            margin-top: 10px;
        }
        .estrellas {
            background: rgba(255,255,255,0.2);
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
        }
        .secciones-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .estrellas, .dt {
            flex: 1;
            min-width: 200px;
            background: rgba(255,255,255,0.2);
            padding: 25px;
            border-radius: 15px;
        }
        .estrellas h2, .dt h2 {
            margin: 0 0 15px;
        }
        .estrella {
            font-size: 1.2em;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
        }
        .dt-nombre {
            font-size: 1.4em;
            font-weight: bold;
            padding: 15px;
            background: rgba(255,255,255,0.25);
            border-radius: 8px;
        }
        .volver {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 25px;
            background: white;
            color: #ff6b35;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="escudo-container">
        <img src="escudo.png" alt="Escudo Mandarina CF">
    </div>
    
    <h1>Mandarina CF</h1>
    <div class="liga">🏆 Liga Roth</div>
    
    <div class="trofeos">
        <div class="trofeo">
            <div class="trofeo-icon">🏅</div>
            <div class="trofeo-nombre">1 Liga Roth</div>
        </div>
        <div class="trofeo">
            <div class="trofeo-icon">🏆</div>
            <div class="trofeo-nombre">1 Super Copa</div>
        </div>
    </div>
    
    <div class="secciones-row">
        <div class="estrellas">
            <h2>⭐ Estrellas ⭐</h2>
            <div class="estrella">Iker Salinas</div>
            <div class="estrella">Iker Salinas II</div>
            <div class="estrella">Iker Kawai</div>
        </div>
        
        <div class="dt">
            <h2>🗣️DT</h2>
            <div class="dt-nombre">Papa Iker</div>
        </div>
    </div>
    
    <a href="index.html" class="volver">← Volver</a>
</body>
</html>
